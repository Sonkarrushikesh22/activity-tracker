name: Update Activity Visualizations

concurrency:
  group: activity-visualizations
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - 'projects/**'
      - '.github/scripts/visualization.js'
      - '.github/workflows/update-activity.yml'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-visualizations:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm init -y
          npm install --no-save @svgdotjs/svg.js@3.2.0 svgdom@0.1.19

      - name: Generate visualizations
        run: node .github/scripts/visualization.js
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add visualizations/
          git diff --cached --quiet && echo "No visualization changes" && exit 0
          git commit -m "Update visualizations"
          git push